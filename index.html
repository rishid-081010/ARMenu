<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekend Special Menu</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Lora:ital,wght@0,500;1,400&family=Montserrat:wght@500&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-color: #ffffff;
        --border-color: #000000;
        --text-color: #000000;
    }

    body, html {
        margin: 0;
        padding: 0;
        background-color: #f0f0f0; /* Outer background to contrast phone */
        font-family: 'Montserrat', sans-serif;
        color: var(--text-color);
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
    }

    .app-container {
        width: 100%;
        max-width: 380px;
        min-height: 750px;
        background-color: var(--bg-color);
        border: 12px solid var(--border-color);
        border-radius: 40px;
        padding: 20px 20px 30px 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        margin: 40px auto;
        position: relative;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    
    /* Top Bar & Compare Button */
    .top-bar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 10px;
    }
    .compare-btn {
        border: 3px solid var(--border-color);
        border-radius: 20px;
        padding: 6px 16px;
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        font-size: 0.8rem;
        background: transparent;
        cursor: pointer;
        color: var(--text-color);
    }

    /* Header */
    .main-title {
        font-family: 'Dancing Script', cursive;
        font-size: 4rem;
        text-align: center;
        margin: 0 0 20px 0;
        font-weight: 700;
        line-height: 1;
    }

    /* Grid Layout */
    .menu-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        margin-bottom: 30px;
        flex-grow: 1;
        align-content: start;
    }

    /* Grid Items */
    .grid-box {
        aspect-ratio: 1;
        border: 3px solid var(--border-color);
        border-radius: 12px;
        background-color: transparent;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 5px;
        box-sizing: border-box;
        text-decoration: none;
        color: var(--text-color);
    }
    .grid-box.active {
        cursor: pointer;
        transition: transform 0.1s, background-color 0.2s;
    }
    .grid-box.active:hover {
        transform: scale(1.05);
        background-color: #f9f9f9;
    }
    .grid-item-title {
        font-size: 0.7rem;
        font-weight: 800;
        margin: 0;
    }
    .grid-item-price {
        font-size: 0.65rem;
        margin-top: 4px;
        font-family: 'Lora', serif;
        font-style: italic;
    }

    /* Pagination */
    .pagination {
        text-align: center;
        font-family: 'Lora', serif;
        font-style: italic;
        font-weight: 700;
        font-size: 1rem;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        margin-top: auto;
    }
    .arrow {
        font-style: normal;
        font-size: 0.8rem;
    }

    /* Intro Overlay Styles */
    .intro-overlay {
        position: absolute; /* relative to app-container */
        top: 0; left: 0; width: 100%; height: 100%;
        background-color: var(--bg-color);
        z-index: 1000;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.4s ease;
        border-radius: 28px; /* Fit inside phone border */
    }
    .intro-content {
        text-align: center;
        padding: 30px 20px;
        background: #fff;
        border-radius: 16px;
        border: 3px solid var(--border-color);
        width: 85%;
    }
    .intro-title {
        font-family: 'Dancing Script', cursive;
        font-size: 2.5rem;
        margin: 0 0 10px 0;
    }
    .intro-subtitle {
        font-family: 'Montserrat', sans-serif;
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 20px;
    }
    .mode-btn-container {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .mode-btn {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        padding: 12px;
        border-radius: 20px;
        cursor: pointer;
        border: 3px solid var(--border-color);
        background: transparent;
        font-size: 0.9rem;
        transition: all 0.2s;
    }
    .mode-btn:hover, .mode-btn-v1 {
        background: var(--border-color);
        color: #fff;
    }
    .mode-btn-v1:hover {
        background: transparent;
        color: var(--text-color);
    }

    /* Dish Details View */
    .dish-details-view {
        display: none;
        flex-direction: column;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0; left: 0;
        background-color: #fff;
        border-radius: 28px;
        z-index: 50;
        overflow: hidden;
    }

    .details-media {
        height: 45%;
        background-color: #444;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 2px;
    }

    .back-btn-golden {
        position: absolute;
        top: 15px;
        right: 15px;
        background-color: #d4af37;
        color: #fff;
        border: none;
        border-radius: 20px;
        padding: 8px 16px;
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        font-size: 0.8rem;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    .details-info {
        flex: 1;
        background-color: #3d3b3c;
        color: #fff;
        padding: 20px;
        display: flex;
        flex-direction: column;
    }

    .details-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 5px;
    }

    .title-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .veg-dot {
        width: 12px;
        height: 12px;
        background-color: #2ecc71;
        border-radius: 50%;
    }

    .details-title {
        font-size: 1.4rem;
        font-weight: 800;
        margin: 0;
    }

    .view-on-table-btn {
        background-color: #fff;
        color: #000;
        border: none;
        border-radius: 20px;
        padding: 8px 16px;
        font-family: 'Montserrat', sans-serif;
        font-weight: 800;
        font-size: 0.8rem;
        cursor: pointer;
    }

    .details-price {
        font-size: 1.1rem;
        font-weight: 700;
        margin-bottom: 15px;
        margin-left: 22px;
    }

    .details-desc {
        font-size: 0.85rem;
        line-height: 1.4;
        color: #ddd;
        margin-bottom: 20px;
        margin-left: 22px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .details-bottom-space {
        background: linear-gradient(to bottom, #3d3b3c, #111);
        height: 120px;
        width: 100%;
    }
    .details-white-bottom {
        background-color: #fff;
        flex: 1;
    }

    /* Modal Styles */
    .modal {
        display: none;
        position: fixed;
        z-index: 100;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.8);
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .modal.active {
        display: flex;
        opacity: 1;
        justify-content: center;
        align-items: center;
    }

    .modal-content {
        position: relative;
        width: 90%;
        height: 80%;
        max-width: 800px;
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    model-viewer {
        width: 100%;
        height: 100%;
        background-color: #f4f4f4;
    }

    .close-btn {
        position: absolute;
        top: 15px;
        right: 20px;
        font-size: 30px;
        color: #333;
        background: #fff;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        border: none;
        cursor: pointer;
        z-index: 10;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    /* Modal Action Buttons */
    .modal-actions {
        position: absolute;
        bottom: 20px;
        left: 0;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        z-index: 10;
        pointer-events: none; /* Let clicks pass through empty space */
    }

    .action-btn {
        pointer-events: auto; /* Enable clicks on the buttons themselves */
        padding: 12px 24px;
        border-radius: 30px;
        font-family: 'Montserrat', sans-serif;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        transition: transform 0.2s, background-color 0.2s;
        border: 2px solid transparent;
        width: 250px;
    }

    .action-btn:hover {
        transform: scale(1.05);
    }

    .native-btn {
        background-color: #4285f4;
        color: white;
    }

    .native-btn:hover {
        background-color: #3367d6;
    }

    .marker-btn {
        background-color: #fff;
        color: var(--gold);
        border-color: var(--gold);
    }

    .marker-btn:hover {
        background-color: var(--bg-color);
    }

    .rotate-controls {
        display: flex;
        gap: 10px;
        margin-bottom: 10px;
        pointer-events: auto;
    }

    .rotate-btn {
        background-color: rgba(255,255,255,0.95);
        color: var(--gold);
        border: 1px solid var(--gold);
        padding: 8px 16px;
        border-radius: 20px;
        font-family: 'Montserrat', sans-serif;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        transition: transform 0.2s;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .rotate-btn:hover {
        transform: scale(1.05);
    }

    .hidden {
        display: none !important;
    }
</style>
</head>
<body>

<div class="app-container">
    
    <!-- Intro Overlay (Now relative to app-container) -->
    <div id="introOverlay" class="intro-overlay">
        <div class="intro-content">
            <h1 class="intro-title">Limetree</h1>
            <p class="intro-subtitle">Choose Mode</p>
            <div class="mode-btn-container">
                <button class="mode-btn mode-btn-v1" onclick="selectMode('v1')">V1: Immersive</button>
                <button class="mode-btn" onclick="selectMode('v2')">V2: Simple 3D</button>
            </div>
        </div>
    </div>

    <!-- Top Bar -->
    <div class="top-bar">
        <button class="compare-btn" onclick="startCompareMode()">Compare</button>
    </div>

    <!-- Title -->
    <h1 class="main-title">Starters</h1>

    <!-- 3x4 Grid (12 Items) -->
    <div class="menu-grid" id="menuGrid">
        <!-- JS will render items here dynamically -->
    </div>

    <!-- Pagination -->
    <div class="pagination">
        <span class="arrow" onclick="prevPage()" style="cursor:pointer">◀◀</span> 
        <span id="pageIndicator">1 of 9</span> 
        <span class="arrow" onclick="nextPage()" style="cursor:pointer">▶▶</span>
    </div>

    <!-- Dish Details View -->
    <div id="dishDetailsView" class="dish-details-view">
        <div class="details-media">
            <!-- VIDEO Placeholder -->
            <button class="back-btn-golden" onclick="closeDetails()">Back to Menu</button>
        </div>
        <div class="details-info">
            <div class="details-header">
                <div class="title-wrapper">
                    <div class="veg-dot"></div>
                    <h2 class="details-title" id="detail-title">Dish name</h2>
                </div>
                <button class="view-on-table-btn" onclick="openModalFromDetails()">View on Table</button>
            </div>
            <div class="details-price" id="detail-price">INR 799</div>
            <p class="details-desc" id="detail-desc">Add the dish's description here...</p>
        </div>
        <div class="details-bottom-space"></div>
        <div class="details-white-bottom"></div>
    </div>

</div>

<!-- 3D Viewer Modal -->
<div class="modal" id="viewerModal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        
        <!-- The default AR button is now allowed to show -->
        <model-viewer id="main-viewer" ar ar-scale="fixed" ar-modes="webxr scene-viewer quick-look" camera-controls touch-action="pan-y" alt="A 3D model of the dish" shadow-intensity="1">
        </model-viewer>
        
        <!-- Custom Action Buttons Container -->
        <div class="modal-actions">
            <div class="rotate-controls">
                <button class="rotate-btn" onclick="rotateModelV()">Vertical ⇅</button>
                <button class="rotate-btn" onclick="rotateModelH()">Horizontal ⇄</button>
            </div>
            <button id="native-ar-btn" class="action-btn native-btn" onclick="startNativeAR()">View in Space (Native AR)</button>
            <button id="marker-ar-btn" class="action-btn marker-btn" onclick="startMarkerAR()">View on Card (MindAR)</button>
        </div>
    </div>
</div>

<!-- Compare Mode View -->
<div id="compareView" class="compare-view">
    <!-- Camera feed background -->
    <video id="cameraBg" autoplay playsinline muted></video>
    
    <!-- Top Close Button -->
    <button class="compare-close-btn" onclick="closeCompareMode()">✕</button>

    <!-- Top Half Container -->
    <div class="compare-half top-half" id="topHalf">
        <div class="compare-controls" id="topControls">
            <button class="compare-add-btn" onclick="openDishSelection('top')">＋ Select Dish</button>
        </div>
        <button class="compare-replace-btn hidden" id="topReplaceBtn" onclick="openDishSelection('top')">Replace</button>
        <model-viewer id="topModelViewer" class="transparent-viewer hidden" camera-controls touch-action="pan-y" auto-rotate disable-zoom shadow-intensity="1"></model-viewer>
    </div>

    <!-- Divider -->
    <div class="compare-divider"></div>

    <!-- Bottom Half Container -->
    <div class="compare-half bottom-half" id="bottomHalf">
        <div class="compare-controls" id="bottomControls">
            <button class="compare-add-btn" onclick="openDishSelection('bottom')">＋ Select Dish</button>
        </div>
        <button class="compare-replace-btn hidden" id="bottomReplaceBtn" onclick="openDishSelection('bottom')">Replace</button>
        <model-viewer id="bottomModelViewer" class="transparent-viewer hidden" camera-controls touch-action="pan-y" auto-rotate disable-zoom shadow-intensity="1"></model-viewer>
    </div>

    <!-- Dish Selection Modal for Compare Mode -->
    <div id="compareSelectModal" class="compare-select-modal hidden">
        <div class="compare-select-content">
            <h3>Select a Dish</h3>
            <div id="compareSelectList" class="compare-select-list">
                <!-- JS will populate options -->
            </div>
            <button class="close-select-btn" onclick="closeDishSelection()">Cancel</button>
        </div>
    </div>
</div>

<script>
    let appMode = 'v1'; // Default

    function selectMode(mode) {
        appMode = mode;
        const overlay = document.getElementById('introOverlay');
        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.style.display = 'none';
        }, 400);

        // Hide fallback links if V2
        if (appMode === 'v2') {
            const fallbackLinks = document.querySelectorAll('.view-fallback');
            fallbackLinks.forEach(link => link.classList.add('hidden'));
        }
    }

    // Initialize Supabase Client
    const SUPABASE_URL = 'https://mbaqukiraerwhpngzwyz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iYXF1a2lyYWVyd2hwbmd6d3l6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MzY1NTksImV4cCI6MjA5NzQxMjU1OX0.N8Hkytw3HpMxRWBU7TPzZe4nR72bv-2qwBg1PfrtfrU';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const modal = document.getElementById('viewerModal');
    const viewer = document.getElementById('main-viewer');
    let currentDishName = '';
    let isARSupported = false;
    let isMobile = false;

    async function detectDeviceCapabilities() {
        isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const supportsQuickLook = isIOS && (document.createElement('a').relList && document.createElement('a').relList.supports('ar'));
        
        if (supportsQuickLook) {
            isARSupported = true;
            updateUI();
            return;
        }

        if (navigator.xr) {
            try {
                const supported = await navigator.xr.isSessionSupported('immersive-ar');
                if (supported) {
                    isARSupported = true;
                    updateUI();
                    return;
                }
            } catch (e) {
                console.log("WebXR detection error:", e);
            }
        }

        customElements.whenDefined('model-viewer').then(() => {
            if (viewer.canActivateAR) {
                isARSupported = true;
            }
            updateUI();
        });
    }

    detectDeviceCapabilities();

    function updateUI() {
        const nativeBtn = document.getElementById('native-ar-btn');
        // We will no longer hide the native AR button based on device checks.
        // WebXR checks often fail on local IPs (http) because it requires HTTPS.
        // We will always show it so the user has the option available.
        if (nativeBtn) {
            nativeBtn.classList.remove('native-hidden');
        }
    }

    const dishData = {
        'burger': { name: 'TRUFFLE ROYALE BURGER', price: 'INR 899', desc: 'A premium wagyu beef patty with black truffle aioli, aged cheddar, and caramelized onions on a toasted brioche bun.', dot: '#e74c3c' },
        'pasta': { name: 'LOBSTER LINGUINE', price: 'INR 1249', desc: 'Handmade linguine tossed in a rich saffron-tomato bisque, topped with butter-poached lobster tail and fresh basil.', dot: '#e74c3c' },
        'cocktail': { name: 'SMOKED NEGRONI', price: 'INR 649', desc: 'A dramatic twist on the classic. Gin, Campari, and sweet vermouth infused with oak smoke and burnt orange peel.', dot: '#2ecc71' }
    };

    const baseDishes = [
        { id: 'burger', name: 'TRUFFLE ROYALE BURGER', price: '899' },
        { id: 'pasta', name: 'LOBSTER LINGUINE', price: '1249' },
        { id: 'cocktail', name: 'SMOKED NEGRONI', price: '649' }
    ];

    const totalItems = 108;
    const itemsPerPage = 12;
    const totalPages = Math.ceil(totalItems / itemsPerPage);
    let currentPage = 1;

    function renderGrid() {
        const grid = document.getElementById('menuGrid');
        if (!grid) return;
        grid.innerHTML = '';
        
        for (let i = 0; i < itemsPerPage; i++) {
            const absoluteIndex = ((currentPage - 1) * itemsPerPage) + i;
            if (absoluteIndex >= totalItems) break;
            
            const dish = baseDishes[absoluteIndex % 3];
            
            const a = document.createElement('a');
            a.className = 'grid-box active';
            a.onclick = () => openDetails(dish.id);
            
            const h2 = document.createElement('h2');
            h2.className = 'grid-item-title';
            h2.innerText = dish.name;
            
            const div = document.createElement('div');
            div.className = 'grid-item-price';
            div.innerText = dish.price;
            
            a.appendChild(h2);
            a.appendChild(div);
            grid.appendChild(a);
        }
        
        document.getElementById('pageIndicator').innerText = `${currentPage} of ${totalPages}`;
    }

    function prevPage() {
        if (currentPage > 1) {
            currentPage--;
            renderGrid();
        }
    }

    function nextPage() {
        if (currentPage < totalPages) {
            currentPage++;
            renderGrid();
        }
    }

    renderGrid();

    let selectedDishForModal = '';

    async function openDetails(dishId) {
        selectedDishForModal = dishId;
        const detailsView = document.getElementById('dishDetailsView');
        const data = dishData[dishId];
        if (data) {
            document.getElementById('detail-title').innerText = data.name;
            document.getElementById('detail-price').innerText = data.price;
            document.getElementById('detail-desc').innerText = data.desc;
            document.querySelector('.veg-dot').style.backgroundColor = data.dot;
        }
        detailsView.style.display = 'flex';
        
        // Pre-fetch model to bypass Safari user-activation timeout for AR
        try {
            const { data: supa, error } = await supabaseClient
                .from('ar_assets')
                .select('model_url, scale')
                .eq('item_id', dishId)
                .single();
            if (supa) {
                viewer.src = supa.model_url;
                let finalScale = supa.scale;
                if (dishId === 'pasta') finalScale = '0.3 0.3 0.3';
                viewer.setAttribute('scale', finalScale);
            }
        } catch (err) {
            console.error("Error pre-loading model:", err);
        }
    }

    function closeDetails() {
        document.getElementById('dishDetailsView').style.display = 'none';
        viewer.removeAttribute('src'); // clear memory
    }

    function openModalFromDetails() {
        if (!selectedDishForModal) return;
        currentDishName = selectedDishForModal;
        
        // Configure UI based on mode
        const nativeBtn = document.getElementById('native-ar-btn');
        const markerBtn = document.getElementById('marker-ar-btn');
        
        if (appMode === 'v2') {
            nativeBtn.style.display = 'none';
            markerBtn.style.display = 'none';
        } else {
            nativeBtn.style.display = 'block';
            markerBtn.style.display = 'block';
        }
        
        modal.style.display = 'flex';
        setTimeout(() => {
            modal.classList.add('active');
        }, 10);
        
        // Directly trigger AR if in V1 mode
        if (appMode === 'v1') {
            startNativeAR();
        }
    }

    function closeModal() {
        modal.classList.remove('active');
        setTimeout(() => {
            modal.style.display = 'none';
        }, 300);
    }

    function startNativeAR() {
        viewer.activateAR();
    }

    function startMarkerAR() {
        window.location.href = `fallback-ar.html?model=${currentDishName}`;
    }

    let mvRotX = 0;
    let mvRotY = 0;

    function rotateModelH() {
        mvRotY += 45;
        // orientation takes "roll pitch yaw"
        // Pitch (X-axis) = Vertical, Yaw (Y-axis) = Horizontal
        viewer.orientation = `0deg ${mvRotX}deg ${mvRotY}deg`;
    }

    function rotateModelV() {
        mvRotX += 45;
        viewer.orientation = `0deg ${mvRotX}deg ${mvRotY}deg`;
    }

    window.onclick = function(event) {
        if (event.target == modal) {
            closeModal();
        }
    }

    // --- COMPARE MODE LOGIC ---
    let cameraStream = null;
    let compareTarget = null; // 'top' or 'bottom'

    async function startCompareMode() {
        const compareView = document.getElementById('compareView');
        const video = document.getElementById('cameraBg');
        
        compareView.classList.add('active');
        
        try {
            // Request rear camera
            cameraStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment' } 
            });
            video.srcObject = cameraStream;
        } catch (err) {
            console.error("Camera access denied or unavailable", err);
        }
    }

    function closeCompareMode() {
        document.getElementById('compareView').classList.remove('active');
        if (cameraStream) {
            cameraStream.getTracks().forEach(track => track.stop());
            cameraStream = null;
        }
    }

    function openDishSelection(targetHalf) {
        compareTarget = targetHalf;
        const modal = document.getElementById('compareSelectModal');
        const list = document.getElementById('compareSelectList');
        
        list.innerHTML = '';
        
        // Populate with base dishes
        baseDishes.forEach(dish => {
            const btn = document.createElement('button');
            btn.className = 'select-item-btn';
            btn.innerHTML = `<span>${dish.name}</span> <span>₹${dish.price}</span>`;
            btn.onclick = () => selectDishForCompare(dish.id);
            list.appendChild(btn);
        });
        
        modal.classList.remove('hidden');
    }

    function closeDishSelection() {
        document.getElementById('compareSelectModal').classList.add('hidden');
    }

    async function selectDishForCompare(dishId) {
        closeDishSelection();
        
        if (!compareTarget) return;
        
        const viewerId = compareTarget === 'top' ? 'topModelViewer' : 'bottomModelViewer';
        const controlsId = compareTarget === 'top' ? 'topControls' : 'bottomControls';
        const replaceBtnId = compareTarget === 'top' ? 'topReplaceBtn' : 'bottomReplaceBtn';
        
        const viewer = document.getElementById(viewerId);
        
        // Hide "Add" button, show "Replace" button
        document.getElementById(controlsId).style.display = 'none';
        document.getElementById(replaceBtnId).classList.remove('hidden');
        viewer.classList.remove('hidden');
        
        try {
            const { data, error } = await supabaseClient
                .from('ar_assets')
                .select('model_url, scale')
                .eq('item_id', dishId)
                .single();
                
            if (data) {
                viewer.src = data.model_url;
                let finalScale = data.scale;
                if (dishId === 'pasta') finalScale = '0.3 0.3 0.3';
                viewer.setAttribute('scale', finalScale);
            }
        } catch (err) {
            console.error("Error loading model for compare:", err);
        }
    }
</script>
</body>
</html>
